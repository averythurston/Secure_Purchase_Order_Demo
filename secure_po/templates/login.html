{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Login</h2>
        <p class="subtitle">Access the secure purchase order workflow by role.</p>
    </div>
</div>

<div class="panel narrow-panel">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" maxlength="80" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" maxlength="128" required>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</div>
{% endblock %}
